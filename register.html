<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NICTM Lost & Found</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .container { position: relative; z-index: 1; width: 100%; max-width: 500px; }
        .register-card {
            background: var(--white); border-radius: 30px; padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(16, 185, 129, 0.2); border: 3px solid var(--primary-light);
        }
        .logo-section { text-align: center; margin-bottom: 35px; }
        .logo-icon {
            width: 80px; height: 80px; background: var(--light); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
            overflow: hidden; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.12);
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .logo-section h1 { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        .logo-section p { color: var(--gray); font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: var(--dark); margin-bottom: 8px; font-size: 14px; }
        input {
            width: 100%; padding: 14px 18px; border: 2px solid #E5E7EB; border-radius: 12px;
            font-size: 15px; transition: all 0.3s ease; font-family: 'Inter', sans-serif;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .btn {
            width: 100%; padding: 16px; background: var(--gradient); color: white; border: none;
            border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error { background: #FEE2E2; color: var(--danger); padding: 12px 16px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; display: none; }
        .success { background: #D1FAE5; color: var(--primary); padding: 12px 16px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; display: none; }
        .divider { text-align: center; margin: 25px 0; color: var(--gray); font-size: 14px; }
        .link { color: var(--primary); text-decoration: none; font-weight: 600; }
        .link:hover { color: var(--primary-dark); }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: var(--gray); text-decoration: none; font-size: 14px; }
        .back-link a:hover { color: var(--primary); }
        .spinner { display: none; border: 3px solid #f3f3f3; border-top: 3px solid white; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) { .register-card { padding: 40px 30px; } body::after { font-size: 100px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-card">
            <div class="logo-section">
                <div class="logo-icon"><img src="images/nictm-logo.png" alt="NICTM logo"></div>
                <h1>Create Account</h1>
                <p>Join NICTM Lost & Found System</p>
            </div>
            <div id="error-message" class="error"></div>
            <div id="success-message" class="success"></div>
            <form id="register-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="studentId">Student ID</label>
                    <input type="text" id="Matric No" placeholder="e.g., ####/#/#/#######" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="your.email@nict.edu.ng" required>
                </div>
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="080XXXXXXXX" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                </div>
                <button type="submit" class="btn" id="register-btn">
                    <span id="btn-text">Create Account</span>
                    <div class="spinner" id="spinner"></div>
                </button>
            </form>
            <div class="divider">Already have an account? <a href="login.html" class="link">Login</a></div>
            <div class="back-link"><a href="index.html">← Back to Home</a></div>
        </div>
    </div>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const form = document.getElementById('register-form');
        const registerBtn = document.getElementById('register-btn');
        const btnText = document.getElementById('btn-text');
        const spinner = document.getElementById('spinner');
        const errorMsg = document.getElementById('error-message');
        const successMsg = document.getElementById('success-message');
        
        auth.onAuthStateChanged((user) => {
            if (user) window.location.href = 'dashboard.html';
        });
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const studentId = document.getElementById('Student ID').value;
            const email = document.getElementById('email').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                errorMsg.textContent = '❌ Passwords do not match!';
                errorMsg.style.display = 'block';
                return;
            }
            
            registerBtn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            errorMsg.style.display = 'none';
            
            const result = await registerUser(email, password, fullName, studentId, phoneNumber);
            
            if (result.success) {
                successMsg.textContent = '✅ Registration successful! Redirecting...';
                successMsg.style.display = 'block';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
            } else {
                errorMsg.textContent = '❌ ' + result.error;
                errorMsg.style.display = 'block';
                registerBtn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>

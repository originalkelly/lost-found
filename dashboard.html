<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dashboard - NICTM</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>.container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:20px}.header{background:var(--white);padding:20px 30px;border-radius:20px;box-shadow:0 10px 40px rgba(16,185,129,.15);display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;border:2px solid var(--light)}.logo{display:flex;align-items:center;gap:15px;font-weight:800;color:var(--primary)}.logo-icon{width:52px;height:52px;background:var(--light);border-radius:15px;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 25px rgba(16,185,129,.12)}.logo-text h1{font-size:20px;margin:0}.logo-text p{margin:0;font-size:14px;color:var(--gray);font-weight:500}.user-info{display:flex;align-items:center;gap:20px}.user-name{font-weight:600;color:var(--dark)}.btn{padding:12px 24px;background:var(--gradient);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:.3s;text-decoration:none;display:inline-block}.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(16,185,129,.3)}.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary)}.btn-outline:hover{background:var(--primary);color:white}.quick-actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:30px}.action-card{background:var(--white);padding:30px;border-radius:20px;box-shadow:0 10px 40px rgba(16,185,129,.1);border:2px solid var(--light);text-align:center;transition:.3s;cursor:pointer}.action-card:hover{transform:translateY(-5px);box-shadow:0 15px 50px rgba(16,185,129,.2)}.action-icon{font-size:48px;margin-bottom:15px}.action-card h3{color:var(--dark);font-size:18px;font-weight:700;margin-bottom:8px}.action-card p{color:var(--gray);font-size:14px}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}.stat-card{background:var(--gradient);color:white;padding:25px;border-radius:15px;text-align:center}.stat-card h4{font-size:36px;font-weight:900;margin-bottom:5px}.stat-card p{font-size:14px;opacity:.9}</style>
</head><body><div class="container"><div class="header"><div class="logo"><div class="logo-icon"><img src="images/nictm-logo.png" alt="NICTM logo"></div><div class="logo-text"><h1>NICTM Lost & Found</h1><p>Welcome to your dashboard</p></div></div><div class="user-info"><span class="user-name" id="user-name">Loading...</span><button onclick="logoutUser()" class="btn">Logout</button></div></div><div class="stats"><div class="stat-card"><h4 id="my-reports">0</h4><p>My Reports</p></div><div class="stat-card"><h4 id="my-claims">0</h4><p>My Claims</p></div></div><div class="quick-actions"><div class="action-card" onclick="location.href='report-lost.html'"><div class="action-icon">😞</div><h3>Report Lost Item</h3><p>Report an item you lost</p></div><div class="action-card" onclick="location.href='report-found.html'"><div class="action-icon">🎉</div><h3>Report Found Item</h3><p>Report an item you found</p></div><div class="action-card" onclick="location.href='search.html'"><div class="action-icon">🔍</div><h3>Search Items</h3><p>Browse lost & found items</p></div></div></div>
<script src="js/firebase-config.js"></script><script src="js/auth.js"></script><script src="js/app.js"></script><script>let currentUser;
checkAuth().then(user => {
    currentUser = user;
    getUserProfile(user.uid).then(profile => {
        document.getElementById('user-name').textContent = profile ? profile.fullName : user.email;
    });
    getUserItems(user.uid).then(items => {
        document.getElementById('my-reports').textContent = items.length;
    });
    getUserClaims(user.uid).then(claims => {
        document.getElementById('my-claims').textContent = claims.length;
    });
});</script></body></html>

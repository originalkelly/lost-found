<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Search - NICTM</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>.container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:20px}.header{background:var(--white);padding:20px 30px;border-radius:20px;margin-bottom:30px;border:2px solid var(--light)}.filters{background:var(--white);padding:25px;border-radius:20px;margin-bottom:30px;border:2px solid var(--light)}.filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:15px}select{width:100%;padding:12px;border:2px solid #E5E7EB;border-radius:10px;font-size:14px}select:focus{outline:0;border-color:var(--primary)}.btn{padding:12px 30px;background:linear-gradient(135deg,#10B981,#34D399);color:white;border:0;border-radius:12px;font-weight:600;cursor:pointer}.btn:hover{transform:translateY(-2px)}.results{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:25px}.item-card{background:var(--white);border-radius:20px;overflow:hidden;box-shadow:0 10px 30px rgba(16,185,129,.1);border:2px solid var(--light);transition:.3s}.item-card:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(16,185,129,.2)}.item-image{width:100%;height:200px;object-fit:cover;background:var(--light)}.item-content{padding:20px}.item-title{font-size:18px;font-weight:700;color:var(--dark);margin-bottom:8px}.item-details{color:var(--gray);font-size:14px;margin-bottom:8px}.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-right:8px;margin-bottom:8px}.badge-lost{background:#FEE2E2;color:#DC2626}.badge-found{background:#D1FAE5;color:#059669}</style>
</head><body><div class="container"><div class="header"><h1 style="color:var(--primary)">🔍 Search Items</h1><p style="color:var(--gray)">Browse lost and found items</p></div><div class="filters"><div class="filter-grid"><select id="reportType"><option value="">All Types</option><option value="lost">Lost Items</option><option value="found">Found Items</option></select><select id="category"><option value="">All Categories</option><option value="Phones">Phones</option><option value="Wallets">Wallets</option><option value="IDs">ID Cards</option><option value="Keys">Keys</option><option value="Bags">Bags</option><option value="Books">Books</option><option value="Electronics">Electronics</option><option value="Other">Other</option></select><select id="location"><option value="">All Locations</option><option value="Library">Library</option><option value="Cafeteria">Cafeteria</option><option value="Lecture Hall">Lecture Hall</option><option value="Lab">Laboratory</option><option value="Hostel">Hostel</option><option value="Sports Complex">Sports Complex</option><option value="Admin Block">Admin Block</option></select></div><button class="btn" onclick="performSearch()">Search</button></div><div id="results" class="results"></div></div>
<script src="js/firebase-config.js"></script><script src="js/auth.js"></script><script src="js/app.js"></script><script>checkAuth();async function performSearch(){const reportType=document.getElementById('reportType').value;const category=document.getElementById('category').value;const location=document.getElementById('location').value;const items=await searchItems({reportType,category,location});displayResults(items)}function displayResults(items){const resultsDiv=document.getElementById('results');if(items.length===0){resultsDiv.innerHTML='<p style="text-align:center;color:var(--gray);grid-column:1/-1">No items found. Try different filters.</p>';return}resultsDiv.innerHTML=items.map(item=>`<div class="item-card"><img src="${item.photoUrl||'https://via.placeholder.com/300x200?text=No+Image'}" class="item-image"><div class="item-content"><div class="item-title">${item.title}</div><span class="badge badge-${item.reportType}">${item.reportType.toUpperCase()}</span><div class="item-details">📍 ${item.location}</div><div class="item-details">📅 ${timeAgo(item.createdAt)}</div></div></div>`).join('')}performSearch();</script></body></html>
